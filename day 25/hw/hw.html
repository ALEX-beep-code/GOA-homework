<html>
  <head>
    <title>tags</title>
  </head>
  <body>
    <!--1) მოიყვანეთ 3 რეალური მაგალითი სადაც შეიძლება გამოვიყენოთ ტეგები (header, main, footer, section, article, aside) ვებსაიტზე.
    მაგალითისთვის გაითვალისწინეთ სხვადასხვა ტიპის საიტები (ბლოგი, ონლაინ მაღაზია, ახალი ამბები და ა.შ.)-->

    <!--header – ლოგო, ძებნა, კალათა
    main – პროდუქტების მთავარი ნაწილი
    section – პროდუქტების კატეგორიები
    article – ერთი პროდუქტის აღწერა
    aside – ფილტრები (ფასი, ზომა)
    footer – კონტაქტი და წესები-->

    <!-- განმარტეთ თითოეული ტეგის დანიშნულება:
    - <header>
    - <main>
    - <footer>
    - <section>
    - <article>
    - <aside>-->

    <!--header – საიტის დასაწყისი: სათაური და მენიუ
    main – მთავარი ნაწილი,
    article – დამოუკიდებელი ინფო
    section – ნაწილებად დასაყოფი თეგი
    aside – გვერდითი ინფორმაცია
    footer – ქვედა ნაწილი (ავტორი, ინფორმაცია)-->

    <!--3) შექმენით მარტივი ვებგვერდი, სადაც გამოიყენებთ:
    - header (საიტის სათაური და ნავიგაცია)
    - main (ძირითადი კონტენტი)
    - footer (საკონტაქტო ინფორმაცია)
    მოთხოვნები -> სათაურები, პარაგრაფები, ღილაკები, სურათები-->
    <header id="3">
        <h1>
            tags
        </h1>
        <ul>
            <nav>
                <li><a href="#3">header</a></li>
                <li><a href="#2">main</a></li>
                <li><a href="#1">footer</a></li>
            </nav>
        </ul>
    </header>
    <main id="2">
        <p>HTML ტეგები გამოიყენება ვებსაიტზე ელემენტების შესაქმნელად. ისინი განსაზღვრავენ ტექსტს, სურათებს და გვერდის სტრუქტურას.</p>
        <img src="./assets/ppopoi.png" alt="image of html tags">
        <button>like</button>
    </main>
    <footer id="1">
        <h2>about us</h2>
        <p>contact info</p>
        <p>512 123 1251</p>
    </footer>
  </body>
</html>
