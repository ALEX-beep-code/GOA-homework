  <body>
    <!--1) მოიყვანეთ 3 რეალური მაგალითი, სადაც შეიძლება გამოვიყენოთ ვიდეო ვებსაიტზე-->

    <!--მუსიკის ვიდეოს ყურება
    ფილმის ტრეილერის ნახვა
    თამაშის გეიმფლეის ვიდეო-->

    <!--2) მოიყვანეთ 3 რეალური მაგალითი, სადაც შეიძლება გამოვიყენოთ აუდიო-->

    <!--მუსიკის მოსმენა
    პოდკასტების მოსმენა
    ხმის ეფექტები საიტზე-->

    <!--3) შექმენით HTML გვერდი, სადაც ჩასვამთ ვიდეოს:
    მოთხოვნები:
    - გამოიყენეთ <video> ტეგი
    - დაამატეთ controls
    - გამოიყენეთ მინიმუმ 1 ვიდეო ფაილი (.mp4 ან .mov)-->

    <video controls width="100px">
        <source src="https://samplelib.com/preview/mp4/sample-5s.mp4" type="video/mp4">
    </video>
    
    <!--4) შექმენით HTML გვერდი, სადაც ჩასვამთ აუდიოს:
    მოთხოვნები:
    - გამოიყენეთ <audio> ტეგი
    - დაამატეთ controls
    - გამოიყენეთ მინიმუმ 1 აუდიო ფაილი (.mp3)-->

    <audio controls>
        <source src="./assets/Rick Roll 10 seconds 1080p - TravelwithElias (128k).mp3" type="audio/mpeg">
    </audio>

    <!--5) შექმენით ვიდეო ან აუდიო ელემენტი, სადაც გამოიყენებთ <source> ტეგს:
    მოთხოვნები:
    - მინიმუმ 2 განსხვავებული ფორმატი (მაგ: mp4 + webm ან mp3 + ogg)
    - ახსენით რატომ ვიყენებთ `<source>` ტეგს-->

    <video width="100px" controls>
        <source src="./assets/Rick Roll 10 seconds 1080p - TravelwithElias (1080p).mp4" type="video/mp4">

        <source src="./assets/Rick Roll 10 seconds 1080p - TravelwithElias (360p).webm" type="video/webm">
        
        the video couldnt load
    </video>
    <!--source ვიყენებთ, რომ ვუთხრათ ბრაუზერს: რომელი ფაილი გახსნას-->

    <!--6) ახსენით შემდეგი ატრიბუტები: controls, autoplay, muted, loop-->

    <!--controls – ღილაკები
    autoplay – თვითონ იწყებს
    muted – ხმა არ არის
    loop – მეორდება ისევ და ისევ-->

    
  </body>
</html>
