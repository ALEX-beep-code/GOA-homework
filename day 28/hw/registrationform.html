<body style="margin:0; font-family:Arial,sans-serif; background:whitesmoke;">


    <header style="background:#4a90e2; color:white; padding:20px; text-align:center; font-size:24px;">Registration Page
    </header>


    <main style="display:flex; justify-content:center; align-items:center; min-height:800px;">


        <img
        style="
          position: absolute;
          top: 0;
          left: 0;
          margin-top: 0;
          width: 100%;
          height: 120px;
          z-index: -1;
          border-bottom: solid black 5px;
        "
        src="assets/gr.jfif"
        alt="black"
        
        <form>
            <div
                style="background:white; padding:30px; width:350px; border-radius:10px; box-shadow: 0px 4px 12px ;">

                <h2 style="text-align:center; margin-bottom:20px; color:gray;">
                    Registration Form
                </h2>

                <input type="text" placeholder="Full Name" required
                    style="width:100%; padding:12px; margin:10px 0; border:1px solid gray; border-radius:6px; font-size:15px; box-sizing:border-box;">

                <input type="email" placeholder="Email" required
                    style="width:100%; padding:12px; margin:10px 0; border:1px solid gray; border-radius:6px; font-size:15px; box-sizing:border-box;">

                <input type="password" placeholder="Password" required
                    style="width:100%; padding:12px; margin:10px 0; border:1px solid gray; border-radius:6px; font-size:15px; box-sizing:border-box;">

                <select
                    style="width:100%; padding:12px; margin:10px 0; border:1px solid gray; border-radius:6px; font-size:15px; box-sizing:border-box;">
                    <option>Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                    <option>Rather Not Say</option>
                </select>

                <button type="submit"
                    style="width:100%; padding:12px; border:none; background:#4a90e2; color:white; font-size:16px; cursor:pointer; border-radius:6px;">
                    Submit
                </button>

            </div>
        </form>

    </main>


    <footer style="background:gray; color:white; text-align:center; padding:15px;">
         2026 Registration Form
    </footer>
