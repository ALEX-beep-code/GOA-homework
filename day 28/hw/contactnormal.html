<html>
  <head>
    <title>Contact Page</title>
  </head>

  <body
    style="
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 950px;
    "
  >
    <header>
      <h1
        style="
          position: absolute;
          top: 0; left: 0;
          margin-top: 0;
          font-size: 90px;
          font-family: fantasy;
          color: aliceblue;
          display: inline;
        "
      >
        GOA
      </h1>

      <div style="display: inline">
        <nav>
          <ul
            style="
              display: flex;
              gap: 100px;
              font-size: 20px;
              position: absolute;
              top: 0px;
              left: 200px;
              font-size: 40px;
              color: aliceblue;
              font-family: sans-serif;
            "
          >
            <li><a href="http://127.0.0.1:5500/day%2029/hw/contactnormal.html">Home</a></li>
            <li>About</li>
            <li>Contact</li>
            <li>registration</li>
          </ul>
        </nav>
      </div>
    </header>

    <img
      style="
        position: absolute;
        top: 0;
        left: 0;
        margin-top: 0;
        width: 100%;
        height: 120px;
        z-index: -1;
        border-bottom: solid black 5px;
      "
      src="assets/gr.jfif"
      alt="black"
    />

    <div
      style="
        width: 90%;
        max-width: 850px;
        background: white;
        border-radius: 18px;
        display: flex;
        box-shadow: 0 8px 25px black;
      "
    >
      <div style="background: #2563eb; color: white; padding: 50px">
        <h1 style="margin-bottom: 20px; font-size: 40px">Contact Us</h1>

        <p style="margin-bottom: 30px">
          Have any questions? Send us a message and we'll get back to you as
          soon as possible
        </p>

        <div style="margin-bottom: 20px">
          <h3 style="margin-bottom: 5px">Email</h3>
          <p>GoalOrientedAcademy@gmail.com</p>
        </div>

        <div style="margin-bottom: 20px">
          <h3 style="margin-bottom: 5px">Phone</h3>
          <p>+995 571 987 654</p>
        </div>

        <div>
          <h3 style="margin-bottom: 5px">Location</h3>
          <p>Delisi Hub</p>
        </div>
      </div>

      <div style="flex: 1; min-width: 300px; padding: 50px">
        <form>
          <div style="margin-bottom: 20px">
            <label
              for="name"
              style="margin-bottom: 8px; color: #555; font-size: 14px"
              >Full Name</label
            >

            <input
              type="text"
              id="name"
              placeholder="Enter your name"
              required
              style="
                width: 100%;
                padding: 14px;
                border: 1px solid #d1d5db;
                border-radius: 10px;
                font-size: 15px;
              "
            />
          </div>

          <div style="margin-bottom: 20px">
            <label
              for="email"
              style="margin-bottom: 8px; color: #555; font-size: 14px"
            >
              Email Address
            </label>

            <input
              type="email"
              id="email"
              placeholder="Enter your email"
              required
              style="
                width: 100%;
                padding: 14px;
                border: 1px solid #d1d5db;
                border-radius: 10px;
                font-size: 15px;
              "
            />
          </div>

          <div style="margin-bottom: 25px">
            <label
              for="message"
              style="
                display: block;
                margin-bottom: 8px;
                color: #555;
                font-size: 14px;
              "
              >Message</label
            >
            <input
              type="text"
              id="message"
              placeholder="Write your message..."
              required
              style="
                width: 100%;
                padding: 14px;
                margin-bottom: 25px;
                border: 1px solid #d1d5db;
                border-radius: 10px;
                font-size: 15px;
              "
            />
          </div>

          <button
            type="submit"
            style="
              width: 100%;
              padding: 15px;
              border: none;
              border-radius: 10px;
              background: #2563eb;
              color: white;
              font-size: 16px;
              cursor: pointer;
            "
          >
            Send Message
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
