<html>

<head>
    <title>inputs</title>
</head>

<body>
    <h1>Sign up</h1>
    <!--ფორმები არიან საჭირო მომხმარებელზე ინფორმაციის მოპოვებისთვის მაგალითად შემიძლია მოვიყვანო facebook, messenger, Gmail-->
    <input type="text" placeholder="enter your name" required> <!--required ატრიბუტი ინფუთში ჩასმას ასაჭიროებს-->
    <!--input თეგი ტექსტის ატრიბუტით გამოიყენება მომხმარებლის სახელის გაგებისთვის-->
    <input type="email" placeholder="enter your email">
    <!--input თეგი ემაილის ატრიბუტით გამოიყენება მომხმარებლის ემაილის გაგებისთვის-->
    <input type="password" placeholder="enter your password" name="password"> <!--name ატრიბუტი გამოიყენება იმისთვის რომ ინფუთში ჩაწერილ ინფორმაციას ჰქონდეს სახელი როცა სერვერში გადაეცემა-->
    <!--input თეგი password - ის ატრიბუტით გამოიყენება მომხმარებლის პაროლის შექმინსთვის-->
    <input type="date" placeholder="enter your birthdate">
    <!--input თეგი date -ის ატრიბუტით გამოიყენება მომხმარებლის დაბადების თარიღის გაგებისთვის-->
    <input type="datetime-local" name="meeting"> <!--datetime-local -გამოიყენება შეხვედრის დროს დასანიშნავად-->
    <input type="submit"
        placeholder="submit"><!--input თეგი submit-ის ატრიბუტით გამოიყენება მომხმარებლის ინფორმაციის სერვერბშ გაგზავნისთვის-->
    <h1>Log in</h1>
    <input type="email" placeholder="enter your email">
    <input type="password" placeholder="enter your password">
    <input type="submit">
</body>

</html>
